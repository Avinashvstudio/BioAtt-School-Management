# Render.com blueprint — deploy from GitHub repo root: admin_panal/
services:
  - type: web
    name: bioatt-school
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_DEBUG
        value: "false"
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
