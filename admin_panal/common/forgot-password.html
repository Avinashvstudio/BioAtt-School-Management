<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - BioAtt Attendance</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth-theme.css">
</head>
<body>
  <div class="auth-container">
    <form id="forgot-password-form">
      <p class="auth-brand">BioAtt School Management</p>
      <h2>Reset password</h2>
      <p class="description">Enter your email address and we'll send you a link to reset your password.</p>
      <input type="email" id="reset-email" placeholder="Enter your email" required />
      <button type="submit">Send Reset Link</button>
      <p><a href="login.html">Back to Login</a></p>
      <p id="reset-message" style="display: none;"></p>
    </form>
  </div>
  <script type="module" src="forgot-password.js"></script>
</body>
</html>
