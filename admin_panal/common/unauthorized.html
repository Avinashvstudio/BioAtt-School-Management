<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - BioAtt Attendance</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .unauthorized-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .unauthorized-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 500px;
    }
    
    .unauthorized-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    .unauthorized-title {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ff6b6b;
    }
    
    .unauthorized-message {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .unauthorized-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn-unauthorized {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: #4CAF50;
      color: white;
    }
    
    .btn-primary:hover {
      background: #45a049;
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="unauthorized-container">
    <div class="unauthorized-card">
      <div class="unauthorized-icon">🚫</div>
      <h1 class="unauthorized-title">Access Denied</h1>
      <p class="unauthorized-message" id="unauthorized-message">
        You don't have permission to access this portal. 
        Please contact your administrator if you believe this is an error.
      </p>
      <p class="unauthorized-detail" id="unauthorized-detail" style="font-size:0.95rem;opacity:0.9;margin-bottom:1.5rem;display:none;"></p>
      <div class="unauthorized-actions">
        <a href="login.html" class="btn-unauthorized btn-primary">Go to Login</a>
        <button onclick="history.back()" class="btn-unauthorized btn-secondary">Go Back</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const reason = params.get('reason') || '';
      const detail = params.get('detail') || '';
      const msg = document.getElementById('unauthorized-message');
      const extra = document.getElementById('unauthorized-detail');
      const hints = {
        missing_profile: 'Your login exists but there is no user profile in the database. Admin must open Users, enter your email and role Driver, then click Repair profile.',
        wrong_role: 'You are signed in with a different role than this portal. Log out completely, then log in with the correct account.',
        error: 'Could not verify your account. Try again or contact admin.',
      };
      if (reason && hints[reason]) {
        msg.textContent = hints[reason];
      }
      if (detail) {
        extra.style.display = 'block';
        extra.textContent = detail;
      }
    })();
  </script>
</body>
</html>
